<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a0a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ff3366" stroke-width="0.3" opacity="0.15"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ff3366" stroke-width="0.3" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ff3366" stroke-width="0.3" opacity="0.15"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ff3366" stroke-width="0.3" opacity="0.15"/>

  <!-- Decorative circle glow -->
  <circle cx="1050" cy="100" r="200" fill="#ff3366" opacity="0.05" filter="url(#glow)"/>
  <circle cx="150" cy="530" r="150" fill="#ff3366" opacity="0.04" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" fill="url(#accent)" rx="3"/>

  <!-- PH. monogram top right -->
  <text x="1100" y="90" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#ff3366" opacity="0.5" text-anchor="middle">PH.</text>

  <!-- Main name -->
  <text x="120" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#ffffff" letter-spacing="-1">Peter Tamunotonye</text>
  <text x="120" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#ffffff" letter-spacing="-1">Jonathan-Hart</text>

  <!-- Tagline -->
  <text x="120" y="450" font-family="'Courier New', monospace" font-size="28" fill="#ff3366" letter-spacing="4">FRONTEND DEVELOPER</text>

  <!-- Bottom line -->
  <rect x="80" y="500" width="400" height="2" fill="url(#accent)" rx="1"/>


</svg>
